name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      # --ignore-scripts (needed above so cli-import.js's postinstall, which
      # hard process.exit(1)s without the maintainer's local Obsidian vault,
      # doesn't fail npm ci) also skips better-sqlite3's own native-binding
      # build step. vite.config.js imports sync-store.js at the top level,
      # so even `vitest run` can't start without that binding — rebuild just
      # this one package explicitly.
      - run: npm rebuild better-sqlite3
      - run: npm run lint
      - run: npm test
