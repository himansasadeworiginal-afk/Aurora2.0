<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora 5.0 — AI Second Brain</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A0A0F" />
    <meta name="description" content="Aurora 5.0 — AI-Powered Second Brain with 3D Knowledge Space" />
    <!-- Self-hosted fonts (Inter + Fraunces) — offline, no CDN. Loaded here so the boot splash gets Inter immediately. -->
    <link rel="stylesheet" href="/fonts.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        margin: 0;
        background: #0A0A0F;
        color: #A6A6B3;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        overflow: hidden;
        height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0A0A0F;
        z-index: 9999;
        transition: opacity 0.8s ease, visibility 0.8s ease;
      }

      #splash.hidden {
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
        display: none;
      }

      #splash .rings {
        position: absolute;
        width: 320px;
        height: 320px;
        border-radius: 50%;
        border: 1px solid rgba(221, 183, 255, 0.07);
        animation: ringPulse 3s ease-in-out infinite;
      }

      #splash .rings:nth-child(2) {
        width: 240px;
        height: 240px;
        animation-delay: 0.6s;
        border-color: rgba(76, 215, 246, 0.06);
      }

      #splash .rings:nth-child(3) {
        width: 160px;
        height: 160px;
        animation-delay: 1.2s;
        border-color: rgba(255, 182, 144, 0.05);
      }

      @keyframes ringPulse {
        0%, 100% { transform: scale(1); opacity: 0.4; }
        50% { transform: scale(1.08); opacity: 0.1; }
      }

      #splash .brand {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      #splash .logo {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 4px;
      }

      #splash .logo-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ddb7ff;
        box-shadow: 0 0 20px rgba(221, 183, 255, 0.6), 0 0 60px rgba(76, 215, 246, 0.2);
        animation: dotPulse 2s ease-in-out infinite;
      }

      @keyframes dotPulse {
        0%, 100% { box-shadow: 0 0 20px rgba(221, 183, 255, 0.55), 0 0 60px rgba(76, 215, 246, 0.2); }
        50% { box-shadow: 0 0 30px rgba(221, 183, 255, 0.8), 0 0 80px rgba(255, 182, 144, 0.3); }
      }

      #splash .logo-line {
        width: 40px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(221, 183, 255, 0.35), transparent);
      }

      #splash h1 {
        font-family: 'Sora', 'Inter', sans-serif;
        font-size: 3.8rem;
        font-weight: 700;
        letter-spacing: -0.04em;
        margin: 0;
        line-height: 1;
        background: linear-gradient(120deg, #fff 0%, #ddb7ff 42%, #4cd7f6 70%, #ffb690 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 40px rgba(221, 183, 255, 0.16));
        animation: titleFade 1.2s ease-out;
      }

      @keyframes titleFade {
        0% { opacity: 0; transform: translateY(10px); filter: drop-shadow(0 0 0px rgba(221, 183, 255, 0)); }
        100% { opacity: 1; transform: translateY(0); filter: drop-shadow(0 0 40px rgba(221, 183, 255, 0.16)); }
      }

      #splash .badge {
        display: inline-block;
        font-size: 0.9rem;
        font-weight: 500;
        color: #ddb7ff;
        -webkit-text-fill-color: #ddb7ff;
        background: rgba(221, 183, 255, 0.1);
        border: 1px solid rgba(221, 183, 255, 0.22);
        padding: 2px 12px;
        border-radius: 20px;
        margin-left: 8px;
        vertical-align: super;
        letter-spacing: 0.02em;
      }

      #splash .tagline {
        font-size: 0.9rem;
        font-weight: 300;
        color: #6E6E7A;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        animation: taglineFade 1.2s ease-out 0.3s both;
      }

      @keyframes taglineFade {
        0% { opacity: 0; transform: translateY(6px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      #splash .progress-track {
        margin-top: 40px;
        width: 160px;
        height: 1px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 1px;
        overflow: hidden;
        animation: progressIn 0.6s ease-out 0.6s both;
      }

      #splash .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ddb7ff, #4cd7f6, #ffb690);
        border-radius: 1px;
        animation: progressLoad 2.2s ease-in-out 0.6s infinite;
      }

      @keyframes progressIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }

      @keyframes progressLoad {
        0% { width: 0%; opacity: 1; }
        30% { width: 35%; opacity: 1; }
        60% { width: 65%; opacity: 0.8; }
        100% { width: 95%; opacity: 0.6; }
      }

      #splash .loading-text {
        margin-top: 12px;
        font-size: 0.7rem;
        font-weight: 300;
        color: #6E6E7A;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        animation: loadingPulse 2s ease-in-out 0.8s infinite;
      }

      @keyframes loadingPulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }

      .no-3d-fallback {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9998;
        background: #0a0a0b;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px;
      }

      .no-3d-fallback h2 {
        color: #ddb7ff;
        font-weight: 300;
        font-size: 2rem;
      }

      .no-3d-fallback p {
        color: #A6A6B3;
        max-width: 500px;
        line-height: 1.6;
        margin-top: 12px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="rings"></div>
      <div class="rings"></div>
      <div class="rings"></div>
      <div class="brand">
        <div class="logo">
          <div class="logo-line"></div>
          <div class="logo-dot"></div>
          <div class="logo-line"></div>
        </div>
        <h1>Aurora<span class="badge">5.0</span></h1>
        <div class="tagline">AI Second Brain</div>
      </div>
      <div class="progress-track">
        <div class="progress-bar"></div>
      </div>
      <div class="loading-text">Initializing Aurora 5.0 — Second Brain</div>
    </div>
    <div class="no-3d-fallback" id="fallback">
      <div>
        <h2>3D Not Available</h2>
        <p>Your browser doesn't support WebGL. Try a modern browser like Chrome, Firefox, or Edge.</p>
      </div>
    </div>
    <div id="root"></div>
    <script>
      setTimeout(function(){
        var s=document.getElementById('splash');
        if(s){
          s.style.display='none';
          s.style.opacity='0';
          s.style.visibility='hidden';
          s.style.pointerEvents='none';
        }
      }, 2000)
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {})
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
